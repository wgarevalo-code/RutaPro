name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk RutaPro.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RutaPro-apk
          path: RutaPro.apk
          if-no-files-found: error

      - name: Publish APK to Release (public download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: RutaPro v1.0.${{ github.run_number }}
          body: APK de RutaPro lista para instalar. Descarga RutaPro.apk y pasala al telefono.
          files: RutaPro.apk
